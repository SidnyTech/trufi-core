name: trufi_core_maps
description: A Flutter package for declarative map rendering backed by MapLibre GL (online and offline).
version: 1.0.0
homepage: https://github.com/trufi-association/trufi-core
publish_to: none
resolution: workspace

environment:
  sdk: ^3.10.0
  flutter: ">=3.0.0 <4.0.0"

dependencies:
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2
  flutter:
    sdk: flutter
  cached_network_image: ^3.4.1
  dio: ^5.9.0
  equatable: ^2.0.8
  flutter_bloc: ^9.1.1
  flutter_svg: ^2.2.3
  latlong2: ^0.9.1
  maplibre_gl: ^0.26.1
  shared_preferences: ^2.5.4
  path_provider: ^2.1.5
  url_launcher: ^6.3.2
  vector_tile: ^4.0.0
  trufi_core_interfaces: ^1.0.0
  trufi_core_utils: ^1.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  generate: true
